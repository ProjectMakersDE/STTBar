name: Release

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release:
    # macos-15 ships Xcode 16 / the macOS 15 SDK, required by WhisperKit's
    # ArgmaxCore (uses the CoreML MLState API that the macos-14 SDK lacks).
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v5
        with:
          node-version: 22.14.0
          cache: npm

      - name: Install release tooling
        run: npm ci

      - name: Test Swift package
        run: swift test
        working-directory: macos-app

      - name: Test shell scripts
        run: |
          bash -n stt-record.sh stt-global-mac.sh stt-runtime.sh stt-transcribe.sh stt-postprocess.sh
          for t in tests/*.sh; do bash "$t"; done

      - name: Semantic release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MACOS_CERT_P12_BASE64: ${{ secrets.MACOS_CERT_P12_BASE64 }}
          MACOS_CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
          MACOS_NOTARY_KEY_P8_BASE64: ${{ secrets.MACOS_NOTARY_KEY_P8_BASE64 }}
          MACOS_NOTARY_KEY_ID: ${{ secrets.MACOS_NOTARY_KEY_ID }}
          MACOS_NOTARY_ISSUER_ID: ${{ secrets.MACOS_NOTARY_ISSUER_ID }}
        run: npm run release
