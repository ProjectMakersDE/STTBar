services:
  whisper:
    image: ghcr.io/speaches-ai/speaches:0.9.0-rc.3-cuda
    container_name: stt-whisper
    ports:
      - "${STT_DOCKER_PORT:-8082}:8000"
    environment:
      - PRELOAD_MODELS=["${STT_MODEL:-Systran/faster-whisper-base}"]
      - STT_MODEL_TTL=${STT_MODEL_TTL:--1}
    volumes:
      - whisper-models:/home/ubuntu/.cache/huggingface/hub
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped

volumes:
  whisper-models:
