services:
  whisper:
    image: ghcr.io/speaches-ai/speaches:latest-cuda
    container_name: stt-whisper
    ports:
      - "${STT_DOCKER_PORT:-8000}:8000"
    environment:
      - PRELOAD_MODELS=["${STT_MODEL:-Systran/faster-whisper-base}"]
    volumes:
      - whisper-models:/home/ubuntu/.cache/huggingface/hub
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped

volumes:
  whisper-models:
